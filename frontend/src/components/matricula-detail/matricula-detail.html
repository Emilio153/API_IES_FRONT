<h2>Detalle de la matrícula</h2>

<div class="detalle">

  <div class="foto">
    <img src="/matricula.webp" alt="Foto matricula">
  </div>

  <div class="info">

    @if(matricula){
      <div class="campo">
        <div class="label">ID</div>
        <div class="valor">{{ matricula.idMat }}</div>
      </div>

      <div class="campo">
        <div class="label">Curso</div>
        <div class="valor">{{ matricula.curso }}</div>
      </div>

      <div class="campo">
        <div class="label">Nota Media</div>
        <div class="valor">{{ matricula.notaMedia }}</div>
      </div>

      <div class="campo">
        <div class="label">Alumno</div>
        <div class="valor">{{ matricula.alumno.nombre }} {{ matricula.alumno.apellidos }}</div>
      </div>

      <div class="campo">
        <div class="label">Asignatura</div>
        <div class="valor">{{ matricula.asignatura.nombre }}</div>
      </div>
    }@else {
      <p>Cargando matricula...</p>
    }

  </div>
</div>

<button class="btn-volver" [routerLink]="['/matriculas']">
  Volver
</button>
